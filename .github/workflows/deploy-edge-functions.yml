name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy sync-catalog --no-verify-jwt
          supabase functions deploy create-order --no-verify-jwt
          supabase functions deploy process-payment --no-verify-jwt
          supabase functions deploy square-webhook --no-verify-jwt
          supabase functions deploy get-loyalty --no-verify-jwt
          supabase functions deploy manage-wallet --no-verify-jwt
          supabase functions deploy fetch-customer --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
