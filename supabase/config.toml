# Configuration Supabase pour Teaven

# === Auth ===
[auth]
enabled = true
site_url = "http://localhost:8081"

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Votre code Teaven : {{ .Code }}"
max_frequency = "60s"

# En local, utiliser le mode "test" (les OTP sont logués dans la console)
# En production, configurer Twilio dans le Dashboard Supabase :
#   Authentication → Providers → Phone → Twilio
[auth.sms.test_otp]
# Numéros de test pour le développement local (code = 123456)
# "+33612345678" = "123456"

# === Edge Functions ===

[functions.sync-catalog]
verify_jwt = false # Appelée par cron / webhook Square

[functions.create-order]
verify_jwt = true

[functions.process-payment]
verify_jwt = true

[functions.square-webhook]
verify_jwt = false # Appelée par Square (vérification HMAC interne)

[functions.get-loyalty]
verify_jwt = true

[functions.manage-wallet]
verify_jwt = true

[functions.fetch-customer]
verify_jwt = true
